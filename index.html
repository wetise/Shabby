<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            text-align: center;
            transition: opacity 1s ease;
        }

        .enter-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        .enter-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        #message-container {
            display: none;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        #typing-text {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #eee;
            min-height: 100px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: var(--gold);
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="enter-btn" onclick="startExperience()">Click Enter to join paradise</button>
    </div>

    <div id="message-container">
        <div id="typing-text"></div><span id="cursor" class="cursor"></span>
    </div>

    <audio id="bgMusic" loop>
        <source src="lyampeke.mp3" type="audio/mpeg">
    </audio>

    <script>
        const text = "sebo ogambye you know html and java script wabula wesaawo🤣🤣nga tosobola yadde no ku creatinga torch mwaana gwe osesa KEIZ Haha anyways tondangamu kulimba next time okay ? 👁👁👁👁";
        const speed = 70; // Adjust typing speed here (in milliseconds)
        
        function startExperience() {
            // Hide button, show message area
            document.getElementById('overlay').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('message-container').style.display = 'block';
                
                // Play Audio
                const audio = document.getElementById('bgMusic');
                audio.play().catch(e => console.log("Audio play failed: ", e));
                
                // Start Typing
                typeWriter(0);
            }, 1000);
        }

        function typeWriter(i) {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(i + 1), speed);
            } else {
                // Keep the cursor blinking at the end
            }
        }
    </script>
</body>
</html>
